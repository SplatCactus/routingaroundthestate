<!DOCTYPE html>
<html lang="en" class="no-js">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">

  <title>Page not found — Routing Around the State</title>

  <!-- Favicon -->
  <link rel="icon" href="/assets/icons/favicon.ico">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Source+Sans+3:wght@400;600&display=swap">

  <!-- Inline script: class swap + theme restore before first paint -->
  <script>
    document.documentElement.classList.replace('no-js', 'js');
    (function () {
      var t = localStorage.getItem('theme');
      if (t === 'dark' || t === 'light') document.documentElement.setAttribute('data-theme', t);
    }());
  </script>

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" media="print" href="print.css">

  <style>
    /* 404-specific layout — builds on .section--hero from style.css */

    .section--404 {
      text-align: center;
      justify-content: center;
    }

    /* Giant decorative number — aria-hidden, purely visual */
    .error-code {
      font-family: var(--font-serif);
      font-size: clamp(7rem, 22vw, 16rem);
      font-weight: var(--weight-black);
      line-height: 1;
      letter-spacing: -0.04em;
      color: rgba(248, 244, 238, 0.05);
      margin-bottom: -0.12em;
      user-select: none;
    }

    /* Tighten hero headline for short message */
    .section--404 .hero__headline {
      font-size: clamp(2.2rem, 6vw, 3.5rem);
      margin-bottom: var(--space-5);
    }

    .section--404 .hero__subhead {
      max-width: 28rem;
    }

    .error-actions {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-5);
      margin-top: var(--space-10);
    }

    .error-back {
      font-family: var(--font-sans);
      font-size: var(--text-sm);
      font-weight: var(--weight-semibold);
      letter-spacing: 0.06em;
      color: rgba(248, 244, 238, 0.55);
      text-decoration: none;
      transition: color 130ms ease;
    }

    .error-back:hover {
      color: var(--color-dark-text);
    }
  </style>
</head>
<body>

  <!-- Reading progress bar -->
  <div id="progress-bar" class="progress-bar" aria-hidden="true"></div>

  <!-- Skip link -->
  <a class="skip-link" href="#main-content">Skip to main content</a>

  <!-- Navigation — identical to index.html; hrefs point to root -->
  <header class="site-header" role="banner">
    <nav class="nav" role="navigation" aria-label="Main navigation">

      <a class="nav__logo" href="/" aria-label="Go to homepage">
        Routing Around the State
      </a>

      <!-- Hamburger toggle — visible only on mobile via CSS -->
      <button
        class="nav__toggle"
        id="nav-toggle"
        aria-controls="nav-menu"
        aria-expanded="false"
        aria-label="Open navigation menu"
      >
        <span class="nav__bar" aria-hidden="true"></span>
        <span class="nav__bar" aria-hidden="true"></span>
        <span class="nav__bar" aria-hidden="true"></span>
      </button>

      <!-- Theme toggle -->
      <button class="nav__theme-toggle" id="theme-toggle" aria-label="Switch to dark mode">
        <svg class="theme-icon theme-icon--moon" xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
        <svg class="theme-icon theme-icon--sun" xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/>
          <line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      </button>

      <ul class="nav__links" id="nav-menu" role="list">
        <li><a class="nav__link" href="/">Home</a></li>
        <li><a class="nav__link" href="/#issue">The Issue</a></li>
        <li><a class="nav__link" href="/#theory">Our Theory</a></li>
        <li><a class="nav__link" href="/#legal">Legal</a></li>
        <li><a class="nav__link nav__link--cta" href="/#donate">Donate</a></li>
      </ul>

    </nav>
  </header>

  <main id="main-content">

    <section class="section section--hero section--404" aria-labelledby="error-heading">
      <div class="section__inner section__inner--hero">

        <!-- Decorative large number — hidden from screen readers -->
        <p class="error-code" aria-hidden="true">404</p>

        <h1 id="error-heading" class="hero__headline">Page not found.</h1>

        <p class="hero__subhead">
          The workers are still here. This page isn't.
        </p>

        <div class="error-actions">
          <a class="error-back" href="/">← Back to the campaign</a>
          <a class="btn btn--primary" href="https://united4iran.org/donate/">Donate to United for Iran &rarr;</a>
        </div>

      </div>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
